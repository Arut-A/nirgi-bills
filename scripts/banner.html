<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}
body{width:1200px;height:340px;background:radial-gradient(1200px 340px at 82% -20%,#6d28d9 0%,#0f1117 55%);
     color:#e2e8f0;padding:46px 56px;position:relative;overflow:hidden;}
.glow{position:absolute;left:-120px;bottom:-160px;width:440px;height:440px;border-radius:50%;
      background:radial-gradient(circle,#a855f755,transparent 60%);}
.eyebrow{font-size:15px;letter-spacing:.32em;text-transform:uppercase;color:#c4b5fd;font-weight:600;}
h1{font-size:62px;font-weight:800;letter-spacing:-.02em;margin:10px 0 6px;
   background:linear-gradient(90deg,#fff,#ddd6fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{font-size:21px;color:#cbd5e1;max-width:780px;line-height:1.4;}
.chips{position:absolute;bottom:40px;left:56px;display:flex;gap:10px;}
.chip{background:#1e293bcc;border:1px solid #3b3357;border-radius:24px;padding:8px 18px;font-size:15px;color:#e2e8f0;font-weight:600;}
</style></head><body>
<div class="glow"></div>
<div class="eyebrow">Android · Jetpack Compose</div>
<h1>Household Bills</h1>
<div class="sub">A decision-support utility-bills app: it tells you what changed and where you deviate from your normal — interactive charts, offline-first, Google Sign-In.</div>
<div class="chips"><span class="chip">Kotlin</span><span class="chip">Compose</span><span class="chip">Material 3</span><span class="chip">Google Sign-In</span><span class="chip">Offline-first</span></div>
</body></html>
